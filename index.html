<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="modal fade" id="promoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <p class="mb-1 text-muted">¡Nuevo Lanzamiento en Phantom!</p>
                <img src="Imagenes\popup.jpg" class="img-fluid" alt="Promo">
                <p class="text-secondary mb-4">Paw Patrol: Championship ya está disponible. ¡No te quedes sin el tuyo!</p>

                <button type="button" class="btn btn-danger rounded-pill px-5 py-2 fw-bold" data-bs-dismiss="modal">
                        Cerrar
                    </button>
            </div>
        </div>
    </div>
</div>

    <a class="navbar-brand fw-bold fs-3" href="index.html" style="letter-spacing: 3px;">PHANTOM</a> <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto text-uppercase">
        <li class="nav-item"><a class="nav-link px-4 fs-6" href="#">Videojuegos</a></li>
        <li class="nav-item"><a class="nav-link px-4 fs-6" href="#">Consolas</a></li>
        <li class="nav-item"><a class="nav-link px-4 fs-6" href="#">Coleccionables</a></li>
        <li class="nav-item"><a class="nav-link px-4 fs-6" href="#">Novedades</a></li>
      </ul>

      <form class="d-flex" role="search">
        <input class="form-control me-2 py-2" type="search" placeholder="Buscar..." aria-label="Search" style="background: #ffffff; border: 1px solid #444; color: #000000;">
        <button class="btn btn-outline-success px-4" type="submit">Buscar</button>
      </form>
    </div>
  </div>
</nav>

<div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active" data-bs-interval="10000">
        <a href="#" title="Ver todas las ofertas de Black Friday">
      <img src="Imagenes/Baner.jpg" class="d-block w-100" alt="...">
      </a>
    </div>
    <div class="carousel-item" data-bs-interval="2000">
        <a href="#" title="Ver todas las ofertas de Black Friday">
      <img src="Imagenes/Baner2.jpg" class="d-block w-100" alt="...">
      </a>
    </div>
    <div class="carousel-item">
        <a href="#" title="Ver todas las ofertas de Black Friday">
      <img src="Imagenes/baner3.jpg" class="d-block w-100" alt="...">
    </a>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
<script src="JS/emergente.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
