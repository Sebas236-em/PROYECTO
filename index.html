<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Prueba</h1>
    <div class="modal fade" id="promoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <p class="mb-1 text-muted">¡Nuevo Lanzamiento en Phantom!</p>
                <img src="Imagenes\popup.jpg" class="img-fluid" alt="Promo">
                <p class="text-secondary mb-4">Paw Patrol: Championship ya está disponible. ¡No te quedes sin el tuyo!</p>

                <button type="button" class="btn btn-danger rounded-pill px-5 py-2 fw-bold" data-bs-dismiss="modal">
                        Cerrar
                    </button>
            </div>
        </div>
    </div>
</div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="JS/emergente.js"></script>
</body>
</html>
